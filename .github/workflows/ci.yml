name: CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.11'

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest

  report-assets:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.11'

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Regenerate reports and site assets
        run: make report

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: report-assets
          path: |
            reports/leaderboard.md
            reports/summary.json
            docs/leaderboard.svg
            docs/summary-chart.svg
            docs/site-data.json
