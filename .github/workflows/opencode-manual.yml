name: OpenCode Manual Task

env:
  OPENCODE_MODEL: google/gemini-2.5-flash

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt for OpenCode in the Duel repository
        required: true
        type: string
      agent:
        description: Optional primary agent name
        required: false
        type: string

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Run manual OpenCode task
        uses: anomalyco/opencode/github@latest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: ${{ env.OPENCODE_MODEL }}
          agent: ${{ inputs.agent }}
          use_github_token: true
          prompt: ${{ inputs.prompt }}

      - name: Configure git user for bot pushes
        run: |
          git config user.email "opencode-agent@users.noreply.github.com"
          git config user.name "OpenCode Agent"
