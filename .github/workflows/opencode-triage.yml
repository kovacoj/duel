name: OpenCode Issue Triage

env:
  OPENCODE_MODEL: google/gemini-2.5-flash

on:
  issues:
    types: [opened]
  workflow_dispatch:

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Check account age
        id: check
        uses: actions/github-script@v7
        if: github.event_name != 'workflow_dispatch'
        with:
          script: |
            const user = await github.rest.users.getByUsername({
              username: context.payload.issue.user.login
            });
            const created = new Date(user.data.created_at);
            const days = (Date.now() - created) / (1000 * 60 * 60 * 24);
            return days >= 30;
          result-encoding: string

      - name: Checkout repository
        if: github.event_name == 'workflow_dispatch' || steps.check.outputs.result == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode issue triage
        if: github.event_name == 'workflow_dispatch' || steps.check.outputs.result == 'true'
        uses: anomalyco/opencode/github@latest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: ${{ env.OPENCODE_MODEL }}
          use_github_token: true
          prompt: |
            Review this issue for the Duel benchmark repository.
            If there is a clear fix, explanation, or relevant docs:
            - summarize likely cause
            - point to relevant files or commands
            - suggest next debugging or implementation step
            If the report is too vague or looks like spam, do not comment.
