name: CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.11'

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest
