<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Duel LLM benchmark">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#071029"/>

  <!-- left title -->
  <g transform="translate(48,48)">
    <rect x="0" y="0" width="180" height="180" rx="16" fill="url(#g)" filter="url(#shadow)" />
    <text x="24" y="104" font-family="Inter,Arial,Helvetica,sans-serif" font-size="44" font-weight="700" fill="#fff">DU</text>
  </g>

  <!-- headline -->
  <g transform="translate(260,64)">
    <text x="0" y="0" font-family="Inter,Arial,Helvetica,sans-serif" font-size="34" font-weight="700" fill="#fff">Duel — LLM Benchmark</text>
    <text x="0" y="34" font-family="Inter,Arial,Helvetica,sans-serif" font-size="16" fill="#aab7c6">Live automation + replayable runs • provider-agnostic metrics</text>

    <!-- animated bars to show activity -->
    <g transform="translate(0,64)">
      <g fill="#0b1220">
        <rect x="0" y="0" width="420" height="48" rx="8" fill="#071129"/>
      </g>
      <g transform="translate(12,8)">
        <rect x="0" y="0" width="56" height="32" rx="6" fill="#0ea5a4">
          <animate attributeName="height" values="20;32;12;32;20" dur="3s" repeatCount="indefinite"/>
          <animate attributeName="y" values="12;0;20;0;12" dur="3s" repeatCount="indefinite"/>
        </rect>
        <rect x="80" y="0" width="56" height="16" rx="6" fill="#7c3aed">
          <animate attributeName="height" values="12;28;16;28;12" dur="2.7s" repeatCount="indefinite"/>
          <animate attributeName="y" values="4;0;12;0;4" dur="2.7s" repeatCount="indefinite"/>
        </rect>
        <rect x="160" y="0" width="56" height="28" rx="6" fill="#06b6d4">
          <animate attributeName="height" values="16;36;8;36;16" dur="3.6s" repeatCount="indefinite"/>
          <animate attributeName="y" values="12;0;28;0;12" dur="3.6s" repeatCount="indefinite"/>
        </rect>
        <rect x="240" y="0" width="56" height="20" rx="6" fill="#fde68a">
          <animate attributeName="height" values="10;30;10;30;10" dur="2.9s" repeatCount="indefinite"/>
          <animate attributeName="y" values="14;0;20;0;14" dur="2.9s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>
  </g>

  <!-- small footer info -->
  <g transform="translate(48,248)">
    <text x="0" y="0" font-family="Inter,Arial" font-size="12" fill="#93a4b9">Open-source LLM benchmarking — README & reports available in the repository.</text>
  </g>

</svg>
