name: OpenCode Comment Tasks

env:
  OPENCODE_MODEL: google/gemini-2.5-flash

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:

jobs:
  opencode:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.comment.user.type != 'Bot' &&
        (
          startsWith(github.event.comment.body, '/oc') ||
          startsWith(github.event.comment.body, '/opencode') ||
          contains(github.event.comment.body, '\n/oc') ||
          contains(github.event.comment.body, '\n/opencode')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode from comment
        uses: anomalyco/opencode/github@latest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: ${{ env.OPENCODE_MODEL }}
          use_github_token: true
          prompt: ${{ github.event_name == 'workflow_dispatch' && 'Review the current issue or pull request context if present, otherwise summarize repository state and next actions.' || '' }}
